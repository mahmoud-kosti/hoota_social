<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.post {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="navbar">👤 Profile Page</div>

<div class="container">

<!-- معلومات المستخدم -->
<div class="card">
  <h3 id="name">Loading...</h3>
  <p id="email"></p>
  <p id="verify"></p>
  <img id="profileImg" src="" />
</div>

<!-- تعديل الاسم -->
<div class="card">
  <h3>تعديل الاسم</h3>
  <input type="text" id="newName" placeholder="New Name">
  <button onclick="updateName()">Save</button>
</div>

<!-- تغيير كلمة المرور -->
<div class="card">
  <h3>تغيير كلمة المرور</h3>
  <input type="password" id="newPass" placeholder="New Password">
  <button onclick="changePassword()">Update</button>
</div>

<!-- رفع صورة -->
<div class="card">
  <h3>رفع صورة بروفايل</h3>
  <input type="file" id="file">
  <button onclick="uploadImage()">Upload</button>
</div>

<!-- بوستات المستخدم -->
<div class="card">
  <h3>بوستاتي</h3>
  <div id="myPosts"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
updatePassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser;

/* ===================== */
/* تحميل المستخدم */
/* ===================== */

onAuthStateChanged(auth, async (user) => {
if (!user) {
window.location.href = "index.html";
return;
}

currentUser = user;

document.getElementById("email").innerText = user.email;
document.getElementById("verify").innerText =
user.emailVerified ? "✅ Verified" : "❌ Not Verified";

/* جلب الاسم */
const snap = await getDoc(doc(db, "users", user.uid));

if (snap.exists()) {
document.getElementById("name").innerText = snap.data().name;
}

/* تحميل البوستات */
loadMyPosts(user.uid);
});

/* ===================== */
/* تعديل الاسم */
/* ===================== */

window.updateName = async function () {
const newName = document.getElementById("newName").value;

await updateDoc(doc(db, "users", currentUser.uid), {
name: newName
});

alert("تم تحديث الاسم");
location.reload();
};

/* ===================== */
/* تغيير كلمة المرور */
/* ===================== */

window.changePassword = async function () {
const newPass = document.getElementById("newPass").value;

await updatePassword(currentUser, newPass);

alert("تم تغيير كلمة المرور");
};

/* ===================== */
/* رفع صورة */
/* ===================== */

window.uploadImage = async function () {
const file = document.getElementById("file").files[0];

const storageRef = ref(storage, "profiles/" + currentUser.uid);

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

await updateDoc(doc(db, "users", currentUser.uid), {
photo: url
});

document.getElementById("profileImg").src = url;

alert("تم رفع الصورة");
};

/* ===================== */
/* تحميل بوستات المستخدم */
/* ===================== */

async function loadMyPosts(uid) {
const snap = await getDocs(collection(db, "posts"));
const box = document.getElementById("myPosts");

box.innerHTML = "";

snap.forEach(d => {
const data = d.data();

if (data.userId === uid) {
box.innerHTML += `
<div class="post">${data.content}</div>
`;
}
});
}

/* ===================== */
/* تسجيل خروج */
/* ===================== */

window.logout = async function () {
await signOut(auth);
window.location.href = "index.html";
};

</script>

</body>
</html>
