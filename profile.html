<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>
body{background:#0f172a;color:white;font-family:Arial}
.container{max-width:500px;margin:auto;padding:15px}
img{width:100px;height:100px;border-radius:50%}
.post{background:#020617;padding:10px;margin-top:10px;border-radius:10px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#3b82f6;color:white}
</style>
</head>

<body>

<div class="container">

<img id="pic">
<h2 id="name"></h2>
<p id="email"></p>

<button onclick="follow()">Follow</button>

<h3>Posts</h3>
<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
updateDoc,
arrayUnion,
arrayRemove,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const uid = new URLSearchParams(location.search).get("uid");

/* user */
const udoc = await getDoc(doc(db,"users",uid));
const user = udoc.data();

name.innerText = user?.name || "User";
email.innerText = user?.email;
pic.src = user?.photo || "https://i.imgur.com/placeholder.png";

/* follow */
window.follow = async ()=>{
const me = auth.currentUser;
if(!me) return alert("login first");

await updateDoc(doc(db,"users",uid),{
followers:arrayUnion(me.uid)
});

alert("followed");
};

/* posts */
const snap = await getDocs(collection(db,"posts"));

snap.forEach(d=>{
const p=d.data();
if(p.userId===uid){
posts.innerHTML+=`
<div class="post">
${p.content}
${p.image ? `<img src="${p.image}" style="width:100%">`:""}
</div>
`;
}
});

</script>

</body>
</html>
