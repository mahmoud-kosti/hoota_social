<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOota Social 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #05050a;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.1);
  --accent-blue: #00d2ff;
  --accent-purple: #9d50bb;
  --neon-glow: 0 0 15px rgba(157, 80, 187, 0.4);
  --text-main: #e0e0e0;
  --input-focus: rgba(0, 210, 255, 0.2);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  background-attachment: fixed;
  /* خلفية فضائية ديناميكية */
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(157, 80, 187, 0.08) 0%, transparent 40%);
}

/* بنر الموقع المتطور */
.hero-banner {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--glass-border);
}

.hero-banner::after {
  content: '';
  position: absolute;
  width: 200%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transform: rotate(-45deg);
  animation: shine-banner 6s infinite;
}

@keyframes shine-banner {
  0% { left: -100%; }
  100% { left: 100%; }
}

.logo-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(to right, #fff, var(--accent-blue), #fff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: textGradient 3s linear infinite;
  filter: drop-shadow(0 0 10px rgba(0,210,255,0.5));
}

@keyframes textGradient {
  to { background-position: 200% center; }
}

.container {
  max-width: 450px;
  margin: -40px auto 40px;
  padding: 0 15px;
  position: relative;
  z-index: 10;
}

/* بطاقات بتأثير الزجاج */
.card {
  background: var(--glass);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
  border-radius: 30px;
  padding: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  margin-bottom: 20px;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card:hover {
  border-color: rgba(0, 210, 255, 0.3);
}

/* مدخلات البيانات */
.input-group {
  margin-bottom: 20px;
  position: relative;
}

input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  padding: 18px 20px;
  color: #fff;
  font-size: 16px;
  transition: all 0.4s ease;
}

input:focus {
  outline: none;
  background: rgba(255,255,255,0.08);
  border-color: var(--accent-blue);
  box-shadow: 0 0 20px var(--input-focus);
  transform: scale(1.02);
}

/* أزرار عصرية */
button {
  width: 100%;
  padding: 16px;
  border-radius: 15px;
  border: none;
  font-weight: 700;
  font-size: 17px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
}

button:active {
  transform: scale(0.95);
}

.btn-primary {
  background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple));
  color: white;
  box-shadow: var(--neon-glow);
}

.btn-edit {
  background: rgba(16, 185, 129, 0.1);
  border: 1px solid #10b981;
  color: #10b981;
  font-size: 14px;
}

.btn-delete {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid #ef4444;
  color: #ef4444;
  font-size: 14px;
}

.btn-logout {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: #94a3b8;
  margin-top: 30px;
}

/* تصميم البوستات */
.post {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px;
  margin-top: 15px;
  animation: fadeIn 0.5s ease;
  position: relative;
}

.post::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; height: 60%; width: 3px;
  background: var(--accent-blue);
  border-radius: 0 10px 10px 0;
}

.post .email {
  font-size: 12px;
  color: var(--accent-blue);
  font-family: 'Orbitron', sans-serif;
  margin-bottom: 10px;
  opacity: 0.8;
}

.post .content {
  font-size: 16px;
  line-height: 1.6;
}

/* روابط التبديل */
.switch-text {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #94a3b8;
}

.switch-text span {
  color: var(--accent-blue);
  font-weight: bold;
  cursor: pointer;
  text-decoration: underline;
}

/* WhatsApp Floating */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
  z-index: 1000;
  animation: pulse-wa 2s infinite;
}

@keyframes pulse-wa {
  0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
  70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
  100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}

/* التنبيهات (Toast) */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.8);
  border: 1px solid var(--accent-blue);
  color: white;
  padding: 12px 25px;
  border-radius: 50px;
  z-index: 10000;
  backdrop-filter: blur(10px);
  animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}

@keyframes slideDown {
  from { transform: translate(-50%, -100px); }
  to { transform: translate(-50%, 0); }
}

@media (max-width: 480px) {
  .hero-banner { height: 150px; }
  .logo-text { font-size: 26px; }
  .card { padding: 25px 18px; }
}
</style>
</head>
<body>

<div id="toastContainer"></div>

<header class="hero-banner">
  <div class="logo-text">HOota Social</div>
  <p style="font-size: 12px; margin-top: 5px; opacity: 0.6; letter-spacing: 2px;">FUTURE OF CONNECTING</p>
</header>

<div class="container">

  <div id="authBox" class="card">
    <div id="loginBox">
      <h2 style="text-align:center; margin-bottom: 25px;">دخول آمن</h2>
      <div class="input-group">
        <input type="email" id="logEmail" placeholder="الإيميل الخاص بك">
      </div>
      <div class="input-group">
        <input type="password" id="logPass" placeholder="كلمة المرور">
      </div>
      <button class="btn-primary" onclick="login()" id="loginBtn">فتح الحساب 🚀</button>
      
      <div class="switch-text">
        <p onclick="showForgotPassword()" style="margin-bottom:10px; cursor:pointer">هل نسيت كلمة السر؟</p>
        <p>ليس لديك حساب؟ <span onclick="showRegister()">سجل الآن</span></p>
      </div>
    </div>

    <div id="registerBox" style="display:none">
      <h2 style="text-align:center; margin-bottom: 25px;">عضوية جديدة</h2>
      <div class="input-group">
        <input type="email" id="regEmail" placeholder="الإيميل">
      </div>
      <div class="input-group">
        <input type="password" id="regPass" placeholder="كلمة المرور">
      </div>
      <div class="input-group">
        <input type="password" id="regPass2" placeholder="تأكيد كلمة المرور">
      </div>
      <button class="btn-primary" onclick="register()" id="registerBtn">تأكيد التسجيل ✨</button>
      <div class="switch-text">
        <p>لديك حساب بالفعل؟ <span onclick="showLogin()">سجل دخولك</span></p>
      </div>
    </div>

    <div id="forgotBox" style="display:none">
      <h2 style="text-align:center; margin-bottom: 25px;">استعادة الوصول</h2>
      <p style="font-size: 13px; text-align: center; margin-bottom: 15px; opacity: 0.7;">أدخل بريدك الإلكتروني لاستلام رابط إعادة التعيين</p>
      <div class="input-group">
        <input type="email" id="forgotEmail" placeholder="الإيميل">
      </div>
      <button class="btn-primary" onclick="forgotPassword()" id="forgotBtn">إرسال الرابط 📧</button>
      <div class="switch-text"><span onclick="showLogin()">عودة للخلف</span></div>
    </div>
  </div>

  <div id="appBox" style="display:none">
    <div class="card">
      <h3 style="margin-bottom: 15px; font-size: 18px;">بماذا تفكر اليوم؟</h3>
      <div class="input-group">
        <input type="text" id="postInput" placeholder="اكتب شيئاً ملهماً...">
      </div>
      <button class="btn-primary" onclick="addPost()">نشر الآن 🔥</button>
    </div>

    <div id="postsList"></div>

    <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>

    <div style="text-align:center; margin-top: 30px; font-size: 12px; color: #555;">
      HOota Social © 2026 | النسخة المطورة V3.0
    </div>
  </div>

</div>

<a href="https://wa.me/249900623733" class="whatsapp-float" target="_blank">
  <svg width="30" height="30" fill="white" viewBox="0 0 16 16">
    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
  </svg>
</a>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://ymepvanoqgvntcuacnhm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZXB2YW5vcWd2bnRjdWFjbmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzE2MDMsImV4cCI6MjA5MTg0NzYwM30.T8vXyv_DsSGoas8kLpNMI3ULEA8keB2pTseHnGUlZyw";
const supabase = createClient(supabaseUrl, supabaseKey);

/* UI Elements */
const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");
const forgotBox = document.getElementById("forgotBox");

/* Navigation Functions */
window.showLogin = () => { loginBox.style.display="block"; registerBox.style.display="none"; forgotBox.style.display="none"; }
window.showRegister = () => { loginBox.style.display="none"; registerBox.style.display="block"; forgotBox.style.display="none"; }
window.showForgotPassword = () => { loginBox.style.display="none"; registerBox.style.display="none"; forgotBox.style.display="block"; }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* Auth Logic (Connects to your existing Supabase) */
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    authBox.style.display = "none";
    appBox.style.display = "block";
    loadPosts();
  } else {
    authBox.style.display = "block";
    appBox.style.display = "none";
  }
});

window.login = async () => {
  const btn = document.getElementById("loginBtn");
  btn.innerText = "جاري التحقق...";
  const { error } = await supabase.auth.signInWithPassword({
    email: logEmail.value,
    password: logPass.value
  });
  if(error) showToast("خطأ: " + error.message);
  btn.innerText = "فتح الحساب 🚀";
}

window.register = async () => {
  if(regPass.value !== regPass2.value) return showToast("كلمات المرور غير متطابقة");
  const { error } = await supabase.auth.signUp({ email: regEmail.value, password: regPass.value });
  if(error) showToast(error.message); else showToast("تم! راجع بريدك الإلكتروني");
}

window.logout = async () => { await supabase.auth.signOut(); showToast("تم تسجيل الخروج"); }

window.addPost = async () => {
  const content = postInput.value.trim();
  if(!content) return;
  const { data: { user } } = await supabase.auth.getUser();
  const { error } = await supabase.from("posts").insert([{ email: user.email, content, user_id: user.id }]);
  if(!error) { postInput.value=""; loadPosts(); showToast("تم النشر بنجاح ✨"); }
}

async function loadPosts() {
  const { data: { user } } = await supabase.auth.getUser();
  const { data } = await supabase.from("posts").select("*").order("created_at", { ascending: false });
  const list = document.getElementById("postsList");
  list.innerHTML = "";
  data.forEach(p => {
    const isOwner = user && user.id === p.user_id;
    list.innerHTML += `
      <div class="post">
        <div class="email">${p.email.split('@')[0]}</div>
        <div class="content">${p.content}</div>
        ${isOwner ? `
          <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-edit" onclick="editPost('${p.id}', '${p.content}')">تعديل</button>
            <button class="btn-delete" onclick="deletePost('${p.id}')">حذف</button>
          </div>
        ` : ''}
      </div>
    `;
  });
}

window.deletePost = async (id) => {
  const { error } = await supabase.from('posts').delete().eq('id', id);
  if(!error) loadPosts();
}

window.editPost = async (id, old) => {
  const val = prompt("تعديل المنشور:", old);
  if(val && val !== old) {
    await supabase.from('posts').update({ content: val }).eq('id', id);
    loadPosts();
  }
}
</script>
</body>
</html>
