<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Instagram Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  position: sticky;
  top: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.post {
  background: #020617;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.post-header {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #94a3b8;
}

a {
  color: #3b82f6;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="navbar">🔥 Instagram Clone</div>

<div class="container">

<h3>إنشاء حساب</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h3>تسجيل دخول</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<hr>

<h3>إنشاء بوست</h3>
<input id="postInput" placeholder="اكتب بوست...">
<button onclick="addPost()">نشر</button>

<div id="postsList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* ================= Firebase ================= */

const firebaseConfig = {
apiKey: "AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= Register ================= */

window.register = async function () {
const email = document.getElementById("regEmail").value;
const pass = document.getElementById("regPass").value;

try {
await createUserWithEmailAndPassword(auth, email, pass);
alert("تم إنشاء الحساب");
} catch (e) {
alert(e.message);
}
};

/* ================= Login ================= */

window.login = async function () {
const email = document.getElementById("logEmail").value;
const pass = document.getElementById("logPass").value;

try {
await signInWithEmailAndPassword(auth, email, pass);
alert("تم تسجيل الدخول");
} catch (e) {
alert(e.message);
}
};

/* ================= Logout ================= */

window.logout = async function () {
await signOut(auth);
};

/* ================= Auth State ================= */

onAuthStateChanged(auth, (user) => {
const status = document.getElementById("status");

if (user) {
status.innerHTML = `
✅ Logged in: ${user.email} 
<br>
<a href="profile.html?uid=${user.uid}">👤 My Profile</a>
`;
loadPosts();
} else {
status.innerText = "❌ Not logged in";
}
});

/* ================= Add Post ================= */

window.addPost = async function () {
const user = auth.currentUser;
const text = document.getElementById("postInput").value;

if (!user) {
alert("سجل دخول أولاً");
return;
}

await addDoc(collection(db, "posts"), {
userId: user.uid,
email: user.email,
content: text,
createdAt: Date.now()
});

document.getElementById("postInput").value = "";
loadPosts();
};

/* ================= Load Feed ================= */

async function loadPosts() {

const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
const snap = await getDocs(q);

const list = document.getElementById("postsList");
list.innerHTML = "";

snap.forEach(doc => {
const d = doc.data();

list.innerHTML += `
<div class="post">
  <div class="post-header">
    <a href="profile.html?uid=${d.userId}">👤 ${d.email}</a>
  </div>
  <div>${d.content}</div>
</div>
`;
});
}

</script>

</body>
</html>
