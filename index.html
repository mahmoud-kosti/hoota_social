<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Instagram Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.navbar{padding:15px;background:#020617;text-align:center;position:sticky;top:0}
.container{max-width:500px;margin:auto;padding:15px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{background:#3b82f6;color:white}
.post{background:#020617;margin-top:10px;padding:10px;border-radius:10px}
.small{font-size:12px;color:#94a3b8}
a{color:#3b82f6;text-decoration:none}
</style>
</head>

<body>

<div class="navbar">🔥 Instagram Pro</div>

<div class="container">

<h3>Login</h3>
<input id="email">
<input id="pass" type="password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<hr>

<h3>Create Post</h3>
<input id="postText">
<button onclick="addPost()">Post</button>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
arrayUnion,
arrayRemove,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* Login */
window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,pass.value);
};

/* Logout */
window.logout = ()=>signOut(auth);

/* Auth */
onAuthStateChanged(auth,(user)=>{
status.innerHTML = user
? `✅ ${user.email} <br><a href="profile.html?uid=${user.uid}">Profile</a>`
: "❌ not logged in";

loadFeed();
});

/* Post */
window.addPost = async ()=>{
const u = auth.currentUser;
if(!u) return alert("login first");

await addDoc(collection(db,"posts"),{
userId:u.uid,
email:u.email,
content:postText.value,
likes:[],
createdAt:Date.now()
});

postText.value="";
loadFeed();
};

/* Feed */
async function loadFeed(){

const q = query(collection(db,"posts"),orderBy("createdAt","desc"));
const snap = await getDocs(q);

feed.innerHTML="";

snap.forEach(d=>{
const p=d.data();

feed.innerHTML += `
<div class="post">
<div class="small">
<a href="profile.html?uid=${p.userId}">${p.email}</a>
</div>

<div>${p.content}</div>

<button onclick="like('${d.id}')">❤️ ${p.likes?.length||0}</button>
<button onclick="commentPrompt('${d.id}')">💬 Comment</button>
</div>
`;
});
}

/* Like */
window.like = async (id)=>{
const u=auth.currentUser;
const ref=doc(db,"posts",id);

await updateDoc(ref,{
likes:arrayUnion(u.uid)
});

loadFeed();
};

/* Comment */
window.commentPrompt = async (postId)=>{
const text = prompt("Comment:");

if(!text) return;

const u=auth.currentUser;

await addDoc(collection(db,"comments"),{
postId,
userId:u.uid,
text,
createdAt:Date.now()
});
};

</script>

</body>
</html>
