<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
transition:0.4s;
background:#f4f6f9;
}

/* DARK MODE */
body.dark{
background:#0f172a;
color:#fff;
}

/* CENTER CARD */
.container{
width:360px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* CARD */
.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.4s;
}

body.dark .card{
background:#1e293b;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:8px;
}

.login{background:#00b894;color:#fff}
.signup{background:#0984e3;color:#fff}

/* SWITCH */
.switch{
text-align:center;
margin-top:10px;
font-size:13px;
cursor:pointer;
color:#555;
}

body.dark .switch{
color:#ccc;
}

/* TOP BAR */
.topbar{
position:fixed;
top:10px;
right:10px;
}

.toggle{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#111;
color:#fff;
}
</style>
</head>

<body>

<!-- DARK TOGGLE -->
<div class="topbar">
<button class="toggle" onclick="toggleTheme()">🌙 وضع داكن</button>
</div>

<!-- LOGIN CARD -->
<div class="container" id="loginBox">
<div class="card">

<h2 style="text-align:center;">تسجيل دخول</h2>

<input id="loginUser" placeholder="اسم المستخدم">
<input id="loginPass" type="password" placeholder="كلمة المرور">

<button class="login" onclick="login()">دخول</button>

<div class="switch" onclick="showSignup()">
ليس لديك حساب؟ إنشاء حساب
</div>

</div>
</div>

<!-- SIGNUP CARD -->
<div class="container" id="signupBox" style="display:none;">
<div class="card">

<h2 style="text-align:center;">إنشاء حساب</h2>

<input id="signupUser" placeholder="اسم المستخدم">
<input id="signupEmail" placeholder="البريد الإلكتروني">
<input id="signupPass" type="password" placeholder="كلمة المرور">

<button class="signup" onclick="signup()">إنشاء الحساب</button>

<div class="switch" onclick="showLogin()">
لديك حساب؟ تسجيل دخول
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, setDoc, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= SIGNUP ================= */
window.signup = async function(){

let user = document.getElementById("signupUser").value;
let email = document.getElementById("signupEmail").value;
let pass = document.getElementById("signupPass").value;

try{
let cred = await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",cred.user.uid),{
username:user,
email:email
});

alert("تم إنشاء الحساب بنجاح ✅");
showLogin();

}catch(e){
alert(errorMessage(e.code));
}
}

/* ================= LOGIN ================= */
window.login = async function(){

let user = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

try{
let users = await signInWithEmailAndPassword(auth,user,pass);

let data = await getDoc(doc(db,"users",users.user.uid));

if(data.exists()){
alert("تم تسجيل الدخول بنجاح ✅");
}else{
alert("مستخدم غير موجود");
}

}catch(e){
alert(errorMessage(e.code));
}
}

/* ================= ERROR HANDLER ================= */
function errorMessage(code){
if(code==="auth/invalid-email") return "بريد إلكتروني غير صحيح";
if(code==="auth/user-not-found") return "المستخدم غير موجود";
if(code==="auth/wrong-password") return "كلمة المرور خطأ";
if(code==="auth/weak-password") return "كلمة المرور ضعيفة (6 أحرف على الأقل)";
return "حدث خطأ غير متوقع";
}

/* ================= UI ================= */
window.showSignup = function(){
document.getElementById("loginBox").style.display="none";
document.getElementById("signupBox").style.display="block";
}

window.showLogin = function(){
document.getElementById("signupBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}

window.toggleTheme = function(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
