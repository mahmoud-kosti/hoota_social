<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{font-family:Arial;background:#f4f6f9}

/* login box */
#authBox{
max-width:400px;margin:100px auto;background:#fff;
padding:30px;border-radius:15px;text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.course-page{display:none}
.course-page.active{display:block}
</style>
</head>

<body>

<!-- تسجيل الدخول -->
<div id="authBox">
<h3>تسجيل الدخول</h3>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary w-100 mb-2" onclick="login()">دخول</button>
<button class="btn btn-success w-100" onclick="signup()">إنشاء حساب</button>
</div>

<!-- التطبيق -->
<div id="app" style="display:none">

<nav class="navbar navbar-dark bg-primary p-3">
<span class="text-white">Mahmoud Technology</span>
<button class="btn btn-danger" onclick="logout()">خروج</button>
</nav>

<div class="container mt-4" id="home">
<h3>📚 الكورسات</h3>

<div onclick="openCourse('prog')" class="card p-3 mt-3">أساليب البرمجة</div>
<div onclick="openCourse('math')" class="card p-3 mt-3">رياضيات</div>

</div>

<div class="container mt-4 course-page" id="prog">
<button onclick="backHome()" class="btn btn-warning">رجوع</button>
<h2>برمجة</h2>
</div>

<div class="container mt-4 course-page" id="math">
<button onclick="backHome()" class="btn btn-warning">رجوع</button>
<h2>رياضيات</h2>
</div>

</div>

<!-- مكتبة Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://nbwpawotguxrgsfpqzwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5id3Bhd290Z3V4cmdzZnBxendnIiwicm9sZSI6ImFub24يIsImlhdCI6MTc3NjIwNjk0MSwiZXhwIjoyMDkxNzgyOTQxfQ.z3jPqnTrciajQy9jVzIAN95RCqJjQPIZQGIuM34kNKM"
);

// تسجيل حساب
async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if(error){
    alert(error.message);
  }else{
    alert("تم إنشاء الحساب ✅");
  }
}

// تسجيل دخول
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
  }
}

// تسجيل خروج
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// التحقق من الجلسة
supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    document.getElementById("authBox").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("authBox").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// التنقل
function openCourse(id){
  document.getElementById("home").style.display="none";
  document.querySelectorAll(".course-page").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function backHome(){
  document.getElementById("home").style.display="block";
  document.querySelectorAll(".course-page").forEach(e=>e.classList.remove("active"));
}
</script>

</body>
</html>
