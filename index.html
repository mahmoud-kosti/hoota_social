<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Login System</title>
</head>
<body>

<h2>إنشاء حساب</h2>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>

<h2>تسجيل دخول</h2>
<input type="email" id="logEmail" placeholder="Email">
<input type="password" id="logPass" placeholder="Password">
<button onclick="login()">Login</button>

<h2>اكتب بوست</h2>
<input type="text" id="postInput" placeholder="اكتب هنا">
<button onclick="addPost()">نشر</button>

<ul id="postsList"></ul>
  
<br><br>
<button onclick="logout()">Logout</button>

<p id="status"></p>

<script type="module">
  import { 
  collection, 
  addDoc, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
  const db = getFirestore(app);

// ✅ تسجيل حساب
window.register = async function () {
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPass").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // ✅ حفظ المستخدم في قاعدة البيانات
    await addDoc(collection(db, "posts"), {
  userId: auth.currentUser.uid,
  content: "Hello",
  createdAt: new Date()
});

    alert("تم إنشاء الحساب وحفظه في قاعدة البيانات 🔥");
  } catch (error) {
    alert(error.message);
  }
};
// ✅ تسجيل دخول
window.login = async function () {
  const email = document.getElementById("logEmail").value;
  const password = document.getElementById("logPass").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("تم تسجيل الدخول");
  } catch (error) {
    alert(error.message);
  }
};

// ✅ تسجيل خروج
window.addPost = async function () {
  const user = auth.currentUser;
  const content = document.getElementById("postInput").value;

  if (!user) {
    alert("لازم تسجل دخول");
    return;
  }

  await addDoc(collection(db, "posts"), {
    userId: user.uid,
    email: user.email,
    content: content,
    createdAt: new Date()
  });

  alert("تم نشر البوست 🔥");
  loadPosts();
};

  async function loadPosts() {
  const querySnapshot = await getDocs(collection(db, "posts"));
  const list = document.getElementById("postsList");

  list.innerHTML = "";

  querySnapshot.forEach(doc => {
    const data = doc.data();

    const li = document.createElement("li");
    li.textContent = data.email + ": " + data.content;

    list.appendChild(li);
  });
}

loadPosts();

// ✅ معرفة حالة المستخدم
onAuthStateChanged(auth, (user) => {
  const status = document.getElementById("status");

  if (user) {
    status.innerText = "✅ مسجل دخول: " + user.email;
  } else {
    status.innerText = "❌ غير مسجل دخول";
  }
});
</script>
  
</body>
  
</html>
