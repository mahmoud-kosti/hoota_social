<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>My Social App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  border-bottom: 1px solid #1e293b;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.post {
  background: #020617;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.email {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="navbar">🔥 My Social App</div>

<div class="container">

  <h3>إنشاء حساب</h3>
  <input type="email" id="regEmail" placeholder="Email">
  <input type="password" id="regPass" placeholder="Password">
  <button onclick="register()">Register</button>

  <h3>تسجيل دخول</h3>
  <input type="email" id="logEmail" placeholder="Email">
  <input type="password" id="logPass" placeholder="Password">
  <button onclick="login()">Login</button>

  <button onclick="logout()">Logout</button>

  <p id="status"></p>

  <hr>

  <h3>اكتب بوست</h3>
  <input type="text" id="postInput" placeholder="اكتب هنا">
  <button onclick="addPost()">نشر</button>

  <div id="postsList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// حماية الصفحة
onAuthStateChanged(auth, (user) => {
  const status = document.getElementById("status");

  if (user) {
    status.innerText = "✅ مسجل دخول: " + user.email;
    loadPosts();
  } else {
    status.innerText = "❌ غير مسجل دخول";
  }
});

// إنشاء حساب
window.register = async function () {
  const email = document.getElementById("regEmail").value;
  const pass = document.getElementById("regPass").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("تم إنشاء الحساب");
  } catch (e) {
    alert(e.message);
  }
};

// تسجيل دخول
window.login = async function () {
  const email = document.getElementById("logEmail").value;
  const pass = document.getElementById("logPass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    alert("تم تسجيل الدخول");
  } catch (e) {
    alert(e.message);
  }
};

// تسجيل خروج
window.logout = async function () {
  await signOut(auth);
  alert("تم تسجيل الخروج");
};

// نشر بوست
window.addPost = async function () {
  const user = auth.currentUser;
  const content = document.getElementById("postInput").value;

  if (!user) {
    alert("سجل دخول أولاً");
    return;
  }

  await addDoc(collection(db, "posts"), {
    userId: user.uid,
    email: user.email,
    content: content,
    createdAt: new Date()
  });

  document.getElementById("postInput").value = "";
  loadPosts();
};

// تحميل البوستات
async function loadPosts() {
  const snap = await getDocs(collection(db, "posts"));
  const list = document.getElementById("postsList");

  list.innerHTML = "";

  snap.forEach(doc => {
    const data = doc.data();

    list.innerHTML += `
      <div class="post">
        <div class="email">${data.email}</div>
        <div>${data.content}</div>
      </div>
    `;
  });
}

</script>

</body>
</html>
