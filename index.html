<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Social App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">🔥 Social App</div>

<div class="container">

<h3>إنشاء حساب</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input type="file" id="file">
<button onclick="register()">Register</button>

<h3>تسجيل دخول</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ========================= */
/* تحويل الصورة إلى Base64 */
/* ========================= */

function getBase64(file) {
return new Promise((resolve) => {
const reader = new FileReader();
reader.onload = () => resolve(reader.result);
reader.readAsDataURL(file);
});
}

/* ========================= */
/* تسجيل حساب */
/* ========================= */

window.register = async function () {

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const file = document.getElementById("file").files[0];

try {

// إنشاء حساب
const userCred = await createUserWithEmailAndPassword(auth, email, password);

// إرسال تحقق بريد
await sendEmailVerification(userCred.user);

// تحويل الصورة (اختياري)
let photo = "";
if (file) {
photo = await getBase64(file);
}

// حفظ المستخدم
await setDoc(doc(db, "users", userCred.user.uid), {
name: name,
email: email,
photo: photo
});

document.getElementById("msg").innerText =
"✔ تم التسجيل + تم إرسال رسالة التحقق";

} catch (e) {
alert(e.message);
}
};

/* ========================= */
/* تسجيل دخول */
/* ========================= */

window.login = async function () {

const email = document.getElementById("loginEmail").value;
const pass = document.getElementById("loginPass").value;

try {

const userCred = await signInWithEmailAndPassword(auth, email, pass);

// منع غير المتحقق
if (!userCred.user.emailVerified) {
alert("❌ يجب تأكيد البريد الإلكتروني أولاً");
await signOut(auth);
return;
}

// تحويل للبروفايل
window.location.href = "profile.html?uid=" + userCred.user.uid;

} catch (e) {
alert(e.message);
}
};

</script>

</body>
</html>
