<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{font-family:Arial;background:#f4f6f9}

#authBox{
max-width:420px;margin:80px auto;background:#fff;
padding:30px;border-radius:15px;text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.hidden{display:none !important;}

.status{
margin-top:10px;
font-size:14px;
font-weight:600;
}

.success{color:green;}
.error{color:red;}

</style>
</head>

<body>

<!-- AUTH -->
<div id="authBox">
<h3>🔐 تسجيل الدخول</h3>

<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary w-100 mb-2" onclick="signup()">إنشاء حساب</button>
<button class="btn btn-success w-100" onclick="login()">تسجيل دخول</button>

<div id="status" class="status"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<nav class="navbar navbar-dark bg-primary p-3">
<span class="text-white">Mahmoud Technology</span>
<button class="btn btn-danger" onclick="logout()">خروج</button>
</nav>

<div class="container mt-4">
<h3>🎉 تم تسجيل الدخول</h3>
<p id="userInfo"></p>
</div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>

console.log("JS LOADED");

/* ===== CONNECT ===== */
const supabase = window.supabase.createClient(
  "https://nbwpawotguxrgsfpqzwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5id3Bhd290Z3V4cmdzZnBxendnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDY5NDEsImV4cCI6MjA5MTc4Mjk0MX0.z3jPqnTrciajQy9jVzIAN95RCqJjQPIZQGIuM34kNKM"
);

/* ===== STATUS ===== */
function show(msg, type){
  const el = document.getElementById("status");
  el.innerText = msg;
  el.className = "status " + type;
}

/* ===== SIGNUP ===== */
async function signup(){
  const email = emailEl().value.trim();
  const password = passEl().value.trim();

  console.log("SIGNUP:", email);

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  console.log(data, error);

  if(error){
    show(error.message, "error");
  }else{
    show("تم إنشاء الحساب ✅", "success");
  }
}

/* ===== LOGIN ===== */
async function login(){
  const email = emailEl().value.trim();
  const password = passEl().value.trim();

  console.log("LOGIN:", email);

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  console.log(data, error);

  if(error){
    show(error.message, "error");
    return;
  }

  show("تم تسجيل الدخول ✅", "success");

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("userInfo").innerText =
    "User: " + data.user.email;
}

/* ===== LOGOUT ===== */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* ===== SESSION ===== */
supabase.auth.onAuthStateChange((event, session) => {
  if(session){
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("userInfo").innerText =
      "User: " + session.user.email;
  }
});

/* ===== HELPERS ===== */
function emailEl(){ return document.getElementById("email"); }
function passEl(){ return document.getElementById("password"); }

</script>

</body>
</html>
