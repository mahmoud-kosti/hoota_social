<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Cairo',Arial;
}
.hero{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    color:#fff;
    padding:60px 20px;
    text-align:center;
}
.course-card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    cursor:pointer;
}
.course-page{display:none}
.course-page.active{display:block}
.home-article{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Mahmoud Technology</h1>
<p>منصة تعليمية</p>
</div>

<!-- HOME -->
<div class="container" id="home">

<div class="course-card" onclick="openCourse('prog')">
<h3>أساليب البرمجة</h3>
<p>تعلم البرمجة من الصفر</p>
</div>

</div>

<!-- COURSE -->
<div class="container mt-5 course-page" id="prog">

<h2>أساليب البرمجة</h2>

<div class="home-article mt-3">
<h4>📌 تسجيل في الكورس</h4>

<input id="studentName" class="form-control" placeholder="اكتب اسمك">
<br>

<button class="btn btn-primary"
onclick="registerStudent(
document.getElementById('studentName').value,
'prog'
)">
تسجيل
</button>

</div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://xblelhmjgtbobuuntyhq.supabase.co";
const supabaseKey = "sb_publishable_SPTU7w-HXUQi3pD09uc7fA_bo2_hGxg";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ✅ تسجيل الطالب (نسخة واحدة فقط بدون تكرار)
function registerStudent(name, course){

  if(!name){
    alert("اكتب اسمك");
    return;
  }

  supabase.from("students").insert([
    { name: name, course: course }
  ])
  .then(() => {
    alert("تم التسجيل ✅");
  })
  .catch((err) => {
    console.log(err);
    alert("في مشكلة ❌");
  });
}

// فتح الكورس بدون كلمة سر ❌
function openCourse(id){
  document.getElementById("home").style.display="none";
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
