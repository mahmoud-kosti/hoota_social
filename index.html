<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Cairo',Arial;
    transition:.3s;
}
.navbar-brand{font-weight:700;font-size:22px}
.nav-link{font-size:17px;font-weight:600}
.ios-switch{
    width:42px;height:22px;background:#ccc;
    border-radius:20px;position:relative;cursor:pointer;
}
.ios-switch::before{
    content:"";width:18px;height:18px;background:#fff;
    position:absolute;top:2px;left:2px;
    border-radius:50%;transition:.3s;
}
body.dark .ios-switch{background:#0d6efd}
body.dark .ios-switch::before{left:22px}

.hero{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    color:#fff;padding:60px 20px;text-align:center;
    border-radius:0 0 30px 30px;
}
.hero h1{font-size:38px;font-weight:700}
.hero p{font-size:20px;margin-top:15px;}

.stats{
    display:flex;justify-content:center;gap:40px;margin-top:40px;text-align:center;
}
.stat-box{
    background:#fff;padding:20px 30px;border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.home-article{
    background:#fff;padding:30px;border-radius:20px;
    margin-top:40px;line-height:1.9;
    border:2px solid #dee2e6;
}

.course-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:40px;
}
.course-card{
    background:#fff;border-radius:15px;overflow:hidden;
    border:2px solid #0d6efd;cursor:pointer;
    transition:.3s;
}
.course-card:hover{transform:translateY(-5px)}

.course-page{display:none}
.course-page.active{display:block}

.lesson{
    background:#fff;padding:20px;border-radius:15px;
    border:2px solid #dee2e6;margin-bottom:20px;
}

footer{
    background:#fff;padding:30px;
    margin-top:50px;text-align:center;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Mahmoud Technology</h1>
<p>منصة تعليمية احترافية</p>
</div>

<!-- HOME -->
<div class="container" id="home">
<h3 class="mt-5 mb-4 text-center">📚 الكورسات</h3>

<div class="course-grid">
<div class="course-card" onclick="openCourse('prog')">
<div class="course-card-body">
<h5>أساليب البرمجة</h5>
<p>تعلم البرمجة من الصفر</p>
</div>
</div>
</div>
</div>

<!-- COURSE -->
<div class="container mt-5 course-page" id="prog">
<h2>أساليب البرمجة</h2>

<div class="home-article mt-4">
<h4>📌 تسجيل في الكورس</h4>

<input id="studentName" class="form-control" placeholder="اكتب اسمك">
<br>

<button class="btn btn-primary"
onclick="registerStudent(
document.getElementById('studentName').value,
'prog'
)">
تسجيل
</button>
</div>

</div>

<footer>
<p>© 2025 Mahmoud Technology</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://xblelhmjgtbobuuntyhq.supabase.co";
const supabaseKey = "sb_publishable_SPTU7w-HXUQi3pD09uc7fA_bo2_hGxg";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

function registerStudent(name, course){
if(!name){
alert("اكتب اسمك");
return;
}

supabase.from("students").insert([
{ name: name, course: course }
])
.then(() => alert("تم التسجيل ✅"))
.catch(() => alert("في مشكلة ❌"));
}

function openCourse(id){
document.getElementById("home").style.display="none";
document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
