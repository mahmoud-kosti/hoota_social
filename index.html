<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ================= SIGN UP =================
window.signUp = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("تم إنشاء الحساب ✅");
  })
  .catch(err=>{
    alert(err.message);
  });
}

// ================= LOGIN =================
window.login = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("تم تسجيل الدخول ✅");
    document.getElementById("authBox").style.display="none";
    document.getElementById("appBox").style.display="block";
  })
  .catch(err=>{
    alert(err.message);
  });
}

// ================= LOGOUT =================
window.logout = function(){
  signOut(auth).then(()=>{
    location.reload();
  });
}
</script>
