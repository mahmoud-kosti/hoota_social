<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Technology</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{font-family:Arial;background:#f4f6f9}

#authBox{
max-width:400px;margin:100px auto;background:#fff;
padding:30px;border-radius:15px;text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.course-page{display:none}
.course-page.active{display:block}

.hidden{display:none !important;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
<h3>تسجيل الدخول</h3>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary w-100 mb-2" onclick="login()">دخول</button>
<button class="btn btn-success w-100" onclick="signup()">إنشاء حساب</button>

<p id="status" style="color:red;margin-top:10px"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">

<nav class="navbar navbar-dark bg-primary p-3">
<span class="text-white">Mahmoud Technology</span>
<button class="btn btn-danger" onclick="logout()">خروج</button>
</nav>

<div class="container mt-4" id="home">
<h3>📚 الكورسات</h3>

<div onclick="openCourse('prog')" class="card p-3 mt-3">أساليب البرمجة</div>
<div onclick="openCourse('math')" class="card p-3 mt-3">رياضيات</div>
</div>

<div class="container mt-4 course-page" id="prog">
<button onclick="backHome()" class="btn btn-warning">رجوع</button>
<h2>برمجة</h2>
</div>

<div class="container mt-4 course-page" id="math">
<button onclick="backHome()" class="btn btn-warning">رجوع</button>
<h2>رياضيات</h2>
</div>

</div>

<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ===== DEBUG ===== */
console.log("JS LOADED");

/* ===== SAFE INIT ===== */
let supabase = null;

try {
  supabase = window.supabase.createClient(
    "https://nbwpawotguxrgsfpqzwg.supabase.co",
    "YOUR_ANON_KEY_HERE"
  );
} catch (e) {
  console.log("Supabase error:", e);
}

/* ===== TEST ===== */
function testJS(){
  alert("JavaScript شغال 🔥");
}

/* ===== SIGNUP ===== */
async function signup(){
  try {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!email || !password){
      alert("أدخل البيانات");
      return;
    }

    if(!supabase){
      alert("Supabase غير متصل");
      return;
    }

    const { error } = await supabase.auth.signUp({ email, password });

    if(error){
      document.getElementById("status").innerText = error.message;
    } else {
      alert("تم إنشاء الحساب ✅");
    }

  } catch(err){
    alert("خطأ في النظام");
  }
}

/* ===== LOGIN ===== */
async function login(){
  try {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!supabase){
      alert("Supabase غير متصل");
      return;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      document.getElementById("status").innerText = error.message;
    }

  } catch(err){
    alert("خطأ في تسجيل الدخول");
  }
}

/* ===== LOGOUT ===== */
async function logout(){
  try {
    if(supabase){
      await supabase.auth.signOut();
    }
    location.reload();
  } catch(e){
    location.reload();
  }
}

/* ===== SESSION ===== */
if(supabase){
  supabase.auth.onAuthStateChange((event, session) => {
    if(session){
      document.getElementById("authBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
    }else{
      document.getElementById("authBox").classList.remove("hidden");
      document.getElementById("app").classList.add("hidden");
    }
  });
}

/* ===== NAV ===== */
function openCourse(id){
  document.getElementById("home").style.display="none";
  document.querySelectorAll(".course-page").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function backHome(){
  document.getElementById("home").style.display="block";
  document.querySelectorAll(".course-page").forEach(e=>e.classList.remove("active"));
}
</script>

</body>
</html>
