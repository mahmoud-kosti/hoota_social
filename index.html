<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>My Social App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  border-bottom: 1px solid #1e293b;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.post {
  background: #020617;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.email {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="navbar">
  🔥 My Social App
  <a href="profile.html" style="color:white; margin-left:15px;">
    👤 Profile
  </a>
</div>

<div class="container">

  <h3>إنشاء حساب</h3>
  <input type="email" id="regEmail" placeholder="Email">
  <input type="password" id="regPass" placeholder="Password">
  <button onclick="register()">Register</button>

  <h3>تسجيل دخول</h3>
  <input type="email" id="logEmail" placeholder="Email">
  <input type="password" id="logPass" placeholder="Password">
  <button onclick="login()">Login</button>

  <button onclick="logout()">Logout</button>

  <p id="status"></p>

  <hr>

  <h3>اكتب بوست</h3>
  <input type="text" id="postInput" placeholder="اكتب هنا">
  <button onclick="addPost()">نشر</button>

  <div id="postsList"></div>

</div>

<!-- 🔥 Supabase -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// 🔑 بياناتك
const supabaseUrl = "https://ymepvanoqgvntcuacnhm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZXB2YW5vcWd2bnRjdWFjbmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzE2MDMsImV4cCI6MjA5MTg0NzYwM30.T8vXyv_DsSGoas8kLpNMI3ULEA8keB2pTseHnGUlZyw";

const supabase = createClient(supabaseUrl, supabaseKey);

// حالة المستخدم
async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();
  const status = document.getElementById("status");

  if (user) {
    status.innerText = "✅ مسجل دخول: " + user.email;
    loadPosts();
  } else {
    status.innerText = "❌ غير مسجل دخول";
  }
}

checkUser();

// إنشاء حساب
window.register = async function () {
  const email = document.getElementById("regEmail").value;
  const pass = document.getElementById("regPass").value;

  const { error } = await supabase.auth.signUp({
    email: email,
    password: pass
  });

  if (error) alert(error.message);
  else alert("تم إنشاء الحساب");
};

// تسجيل دخول
window.login = async function () {
  const email = document.getElementById("logEmail").value;
  const pass = document.getElementById("logPass").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if (error) alert(error.message);
  else {
    alert("تم تسجيل الدخول");
    checkUser();
  }
};

// تسجيل خروج
window.logout = async function () {
  await supabase.auth.signOut();
  alert("تم تسجيل الخروج");
  checkUser();
};

// نشر بوست
window.addPost = async function () {
  const content = document.getElementById("postInput").value;

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("سجل دخول أولاً");
    return;
  }

  const { error } = await supabase.from("posts").insert([
    {
      email: user.email,
      content: content
    }
  ]);

  if (error) {
    alert(error.message);
  } else {
    document.getElementById("postInput").value = "";
    loadPosts();
  }
};

// تحميل البوستات
async function loadPosts() {
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const list = document.getElementById("postsList");
  list.innerHTML = "";

  if (data) {
    data.forEach(post => {
      list.innerHTML += `
        <div class="post">
          <div class="email">${post.email}</div>
          <div>${post.content}</div>
        </div>
      `;
    });
  }
}
</script>

</body>
</html>
