<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Instagram Fix</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.navbar{padding:15px;background:#020617;text-align:center}
.container{max-width:500px;margin:auto;padding:15px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{background:#3b82f6;color:white}
.post{background:#020617;margin-top:10px;padding:10px;border-radius:10px}
a{color:#3b82f6;text-decoration:none}
</style>
</head>

<body>

<div class="navbar">🔥 Instagram Fixed</div>

<div class="container">

<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>

<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<p id="status"></p>

<hr>

<h3>Post</h3>
<input id="postText">
<button onclick="addPost()">Post</button>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTER ================= */
window.register = async function () {
try {
await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
alert("Account Created");
} catch (e) {
alert(e.message);
}
};

/* ================= LOGIN ================= */
window.login = async function () {
try {
await signInWithEmailAndPassword(auth, logEmail.value, logPass.value);
alert("Logged in");
} catch (e) {
alert(e.message);
}
};

/* ================= LOGOUT ================= */
window.logout = ()=>signOut(auth);

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth,(user)=>{
status.innerHTML = user
? `✅ ${user.email} <br><a href="profile.html?uid=${user.uid}">Profile</a>`
: "❌ not logged in";

loadFeed();
});

/* ================= POST ================= */
window.addPost = async function () {
const user = auth.currentUser;
if(!user) return alert("login first");

await addDoc(collection(db,"posts"),{
userId:user.uid,
email:user.email,
content:postText.value,
createdAt:Date.now(),
likes:[]
});

postText.value="";
loadFeed();
};

/* ================= FEED ================= */
async function loadFeed(){

const q = query(collection(db,"posts"),orderBy("createdAt","desc"));
const snap = await getDocs(q);

feed.innerHTML="";

snap.forEach(d=>{
const p=d.data();

feed.innerHTML += `
<div class="post">
<a href="profile.html?uid=${p.userId}">${p.email}</a>
<p>${p.content}</p>
</div>
`;
});
}

</script>

</body>
</html>
