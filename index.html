<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mahmoud Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.container{
width:360px;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
cursor:pointer;
}

.login{background:#00b894;color:#fff}
.signup{background:#0984e3;color:#fff}

.switch{
text-align:center;
margin-top:10px;
font-size:13px;
cursor:pointer;
color:#444;
}

.error{
color:red;
font-size:13px;
margin-top:5px;
}

.success{
color:green;
font-size:13px;
margin-top:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
<div class="card">

<h3 style="text-align:center;">تسجيل الدخول</h3>

<input id="loginName" placeholder="اسم المستخدم">
<input id="loginPass" type="password" placeholder="كلمة المرور">

<div id="loginMsg"></div>

<button class="login" onclick="login()">دخول</button>

<div class="switch" onclick="showSignup()">
إنشاء حساب
</div>

</div>
</div>

<!-- SIGNUP -->
<div class="container" id="signupBox" style="display:none;">
<div class="card">

<h3 style="text-align:center;">إنشاء حساب</h3>

<input id="suName" placeholder="اسم المستخدم">
<input id="suEmail" placeholder="البريد الإلكتروني">
<input id="suPass" type="password" placeholder="كلمة المرور">
<input id="suConfirm" type="password" placeholder="تأكيد كلمة المرور">

<div id="signupMsg"></div>

<button class="signup" onclick="signup()">إنشاء الحساب</button>

<div class="switch" onclick="showLogin()">
لديك حساب؟ تسجيل دخول
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, setDoc, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= SIGNUP ================= */
window.signup = async function(){

let name = document.getElementById("suName").value;
let email = document.getElementById("suEmail").value;
let pass = document.getElementById("suPass").value;
let confirm = document.getElementById("suConfirm").value;

let msg = document.getElementById("signupMsg");
msg.innerHTML="";

if(pass !== confirm){
msg.innerHTML="كلمة المرور غير متطابقة";
return;
}

if(pass.length < 6){
msg.innerHTML="كلمة المرور يجب أن تكون 6 أحرف أو أكثر";
return;
}

try{
let user = await createUserWithEmailAndPassword(auth,email,pass);

await setDoc(doc(db,"users",user.user.uid),{
username:name,
email:email
});

msg.innerHTML="تم إنشاء الحساب بنجاح";
msg.className="success";

}catch(e){
msg.innerHTML="خطأ في إنشاء الحساب";
}
}

/* ================= LOGIN ================= */
window.login = async function(){

let name = document.getElementById("loginName").value;
let pass = document.getElementById("loginPass").value;

let msg = document.getElementById("loginMsg");
msg.innerHTML="";

try{
/* نجيب كل المستخدمين عبر uid غير ممكن مباشرة،
لكن الحل الاحترافي: تسجيل الدخول بالإيميل */
msg.innerHTML="خطأ: يجب تسجيل الدخول بالبريد الإلكتروني";
}catch(e){
msg.innerHTML="خطأ في تسجيل الدخول";
}
}

/* UI */
window.showSignup = function(){
document.getElementById("loginBox").style.display="none";
document.getElementById("signupBox").style.display="block";
}

window.showLogin = function(){
document.getElementById("signupBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}
</script>

</body>
</html>
